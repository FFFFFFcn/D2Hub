name: Build & Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tagName 和 releaseName 里的 __VERSION__ 会被自动替换为 Cargo.toml 的版本号
          tagName: v__VERSION__
          releaseName: 'D2Copilot v__VERSION__'
          releaseBody: |
            ## D2Copilot — Dota 2 国服/全球服一键切换

            - 托盘驻留，左键打开面板，右键退出
            - 下拉选择服务器（国服/全球服）
            - 启动参数：跳过开场动画 / 高优先级启动
            - 点击启动同步打开 metaDota2 攻略站
            - 自动检测活跃 Steam 账号 + 真实头像
            - 赛博朋克 2077 黄黑配色

          releaseDraft: false
          prerelease: false
