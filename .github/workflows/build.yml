name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tagName 和 releaseName 里的 __VERSION__ 会被自动替换为 Cargo.toml 的版本号
          tagName: v__VERSION__
          releaseName: 'Dota2 Switcher v__VERSION__'
          releaseBody: |
            ## Dota2 国服/全球服一键切换工具

            ### 功能
            - 托盘图标，点击弹出菜单
            - 🇨🇳 国服（-perfectworld）/ 🌍 全球服 一键启动
            - 自动检测当前活跃的 Steam 账号
            - 首次自动清理 Steam 启动选项（仅一次）
            - 可配置额外启动参数（-novid / -console / -high）
            - Steam 未运行时自动拉起

            ### 安装
            下载 .msi 或 .exe 安装包运行即可。

          releaseDraft: true
          prerelease: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: dota2switch-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
